  - name: copy the mongo repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: Install mongodb server
    ansible.builtin.dnf:
      name: mongodb-org
      state: present

  - name: enable and start service
    ansible.builtin.service:
      name: mongod
      state: started
      enabled: yes

  - name: allow remote connection
    ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name: Again restart service
    ansible.builtin.service:
      name: mongod
      state: restarted